name: Design Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'app/globals.css'
      - 'DESIGN.md'

jobs:
  design-audit:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    env:
      REPO_ROOT: ./tests/fixtures
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build

      - name: Start server and take screenshots
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx tsx scripts/take-screenshots.ts

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        with:
          name: design-screenshots
          path: screenshots/
          retention-days: 7

      - name: Run design review
        if: env.ANTHROPIC_API_KEY != ''
        id: review
        run: |
          REVIEW=$(npx tsx scripts/design-review.ts)
          echo "$REVIEW" > design-review-output.md
          cat design-review-output.md

      - name: Post review comment
        if: env.ANTHROPIC_API_KEY != '' && steps.review.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: design-review
          path: design-review-output.md
