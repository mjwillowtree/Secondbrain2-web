name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    env:
      REPO_ROOT: ./tests/fixtures
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  e2e:
    needs: lint-typecheck-build
    runs-on: ubuntu-latest
    env:
      REPO_ROOT: ./tests/fixtures
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - run: npx playwright test
        env:
          REPO_ROOT: ./tests/fixtures

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    needs: lint-typecheck-build
    runs-on: ubuntu-latest
    env:
      REPO_ROOT: ./tests/fixtures
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

  design-audit:
    needs: lint-typecheck-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    env:
      REPO_ROOT: ./tests/fixtures
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build

      - name: Start server and take screenshots
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx tsx scripts/take-screenshots.ts

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        with:
          name: design-screenshots
          path: screenshots/
          retention-days: 7

      - name: Run design review
        if: env.ANTHROPIC_API_KEY != ''
        id: review
        run: |
          REVIEW=$(npx tsx scripts/design-review.ts)
          echo "$REVIEW" > design-review-output.md
          cat design-review-output.md

      - name: Post review comment
        if: env.ANTHROPIC_API_KEY != '' && steps.review.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: design-review
          path: design-review-output.md
